<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which is the best? | I think Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --a: #FF6B6B; --a-light: rgba(255,107,107,0.15);
  --b: #4ECDC4; --b-light: rgba(78,205,196,0.15);
  --bg: #1A1A2E;
  --surface: #16213E;
  --surface2: #1E2D50;
  --text: #FFFFFF;
  --text2: rgba(255,255,255,0.55);
  --yellow: #FFE66D;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem 1rem 2rem;
}

.header {
  width: 100%; max-width: 580px;
  text-align: center;
  padding: 1.5rem 0 0.75rem;
}
.header h1 {
  font-family: 'Boogaloo', cursive;
  font-size: 26px;
  color: var(--yellow);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.header .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.header .instruction {
  font-size: 12px; color: var(--text2);
  background: var(--surface2);
  border-radius: 8px;
  padding: 6px 12px;
  display: inline-block;
  margin-top: 6px;
}

.tabs {
  display: flex; gap: 8px;
  margin-bottom: 1rem;
  width: 100%; max-width: 580px;
}
.tab {
  flex: 1; padding: 12px;
  border-radius: 12px;
  border: 2px solid transparent;
  font-size: 16px; font-weight: 700;
  font-family: 'Boogaloo', cursive;
  letter-spacing: 1px;
  cursor: pointer; transition: all 0.2s;
  text-align: center;
}
.tab.a { background: var(--a-light); border-color: rgba(255,107,107,0.3); color: var(--a); }
.tab.b { background: var(--b-light); border-color: rgba(78,205,196,0.3);  color: var(--b); }
.tab.a.active { background: var(--a); color: #fff; border-color: var(--a); }
.tab.b.active { background: var(--b); color: #fff; border-color: var(--b); }

.progress-wrap {
  width: 100%; max-width: 580px;
  height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 2px; margin-bottom: 1rem; overflow: hidden;
}
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.fill-a { background: var(--a); }
.fill-b { background: var(--b); }

.card-wrap { width: 100%; max-width: 580px; margin-bottom: 1rem; }
.card {
  background: var(--surface);
  border-radius: 20px;
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  border: 2px solid rgba(255,255,255,0.06);
  min-height: 300px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.card.ca { border-color: rgba(255,107,107,0.3); }
.card.cb { border-color: rgba(78,205,196,0.3); }
.card::before {
  content: '';
  position: absolute; top: -50px; right: -50px;
  width: 140px; height: 140px;
  border-radius: 50%; opacity: 0.05;
}
.card.ca::before { background: var(--a); }
.card.cb::before { background: var(--b); }

.card-no { font-size: 12px; color: var(--text2); letter-spacing: 2px; margin-bottom: 1rem; font-family: 'Boogaloo', cursive; }

.question {
  font-family: 'Boogaloo', cursive;
  font-size: 16px; color: var(--text2);
  margin-bottom: 1rem; letter-spacing: 0.5px;
}

.choices {
  display: flex; flex-wrap: wrap;
  gap: 10px; justify-content: center;
  margin-bottom: 1.25rem;
}
.choice {
  font-family: 'Boogaloo', cursive;
  font-size: 22px;
  padding: 10px 20px;
  border-radius: 12px;
  background: var(--surface2);
  color: var(--text);
  letter-spacing: 0.5px;
}
.card.ca .choice { border: 1px solid rgba(255,107,107,0.2); }
.card.cb .choice { border: 1px solid rgba(78,205,196,0.2); }

.prompt {
  font-size: 13px; color: var(--text2);
  margin-top: 0.5rem;
}
.prompt strong {
  font-family: 'Boogaloo', cursive;
  font-size: 15px; letter-spacing: 0.5px;
}
.card.ca .prompt strong { color: var(--a); }
.card.cb .prompt strong { color: var(--b); }

.counter { font-size: 12px; color: var(--text2); margin-top: 1rem; font-weight: 700; letter-spacing: 1px; }

.done-card {
  width: 100%; max-width: 580px;
  background: var(--surface); border-radius: 20px;
  padding: 3rem 2rem; text-align: center; display: none;
}
.done-card.show { display: block; }
.done-emoji { font-size: 56px; margin-bottom: 1rem; }
.done-title { font-family: 'Boogaloo', cursive; font-size: 28px; color: var(--yellow); margin-bottom: 0.5rem; }
.done-sub { font-size: 14px; color: var(--text2); }

.btn-next {
  width: 100%; max-width: 580px;
  padding: 16px; border-radius: 14px; border: none;
  font-size: 18px; font-family: 'Boogaloo', cursive; letter-spacing: 1px;
  cursor: pointer; transition: transform 0.1s;
  margin-bottom: 0.75rem; color: #fff;
}
.btn-next:active { transform: scale(0.97); }
.btn-next.ba { background: var(--a); }
.btn-next.bb { background: var(--b); }

.btn-reset {
  width: 100%; max-width: 580px;
  padding: 12px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.1);
  background: transparent; color: var(--text2);
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.btn-reset:hover { background: rgba(255,255,255,0.05); }

@keyframes pop {
  0%   { transform: scale(0.93); opacity: 0; }
  60%  { transform: scale(1.02); }
  100% { transform: scale(1);    opacity: 1; }
}
.card.animate { animation: pop 0.22s ease-out; }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 Which is the best?</h1>
  <p class="subtitle">3つの中から一番を選んで理由を言おう！</p>
  <p class="instruction">💬 "I think ～ is the best because ..." で答えよう</p>
</div>

<div class="tabs">
  <div class="tab a active" onclick="switchSet('a')">🔴 Aセット</div>
  <div class="tab b"        onclick="switchSet('b')">🔵 Bセット</div>
</div>

<div class="progress-wrap">
  <div class="progress-fill fill-a" id="progress-fill" style="width:0%"></div>
</div>

<div class="card-wrap">
  <div class="card ca animate" id="main-card">
    <div class="card-no" id="card-no">1 / 20</div>
    <div class="question">Which is the best?</div>
    <div class="choices" id="card-choices"></div>
    <div class="prompt ca" id="card-prompt">
      <strong>"I think ～ is the best because ..."</strong><br>
      <span style="font-size:12px">理由をつけてペアに伝えよう</span>
    </div>
    <div class="counter" id="counter">1 / 20</div>
  </div>
  <div class="done-card" id="done-card">
    <div class="done-emoji">🎉</div>
    <div class="done-title">全部おわった！</div>
    <div class="done-sub" id="done-sub">20問 コンプリート！</div>
  </div>
</div>

<button class="btn-next ba" id="btn-next" onclick="nextCard()">次のお題 ▶</button>
<button class="btn-reset" onclick="resetCards()">🔄 最初からやり直す</button>

<script>
const SETS = {
  a: [
    ["Ramen", "Sushi", "Takoyaki"],
    ["Dogs", "Cats", "Rabbits"],
    ["Math", "English", "PE"],
    ["Netflix", "YouTube", "TikTok"],
    ["Pizza", "Pasta", "Burger"],
    ["Soccer", "Basketball", "Baseball"],
    ["Chocolate", "Vanilla", "Strawberry"],
    ["Reading", "Gaming", "Sports"],
    ["Comedy", "Action", "Horror"],
    ["Singing", "Dancing", "Drawing"],
    ["Guitar", "Piano", "Drums"],
    ["Camping", "Swimming", "Hiking"],
    ["Breakfast", "Lunch", "Dinner"],
    ["Instagram", "X", "LINE"],
    ["Zoo", "Aquarium", "Amusement park"],
    ["Manga", "Anime", "Games"],
    ["Bowling", "Karaoke", "Purikura"],
    ["Convenience store", "Supermarket", "Online shopping"],
    ["Earphones", "Headphones", "Speakers"],
    ["Sneakers", "Sandals", "Boots"],
  ],
  b: [
    ["Udon", "Soba", "Ramen"],
    ["Science", "Social Studies", "Art"],
    ["Curry", "Hamburger", "Spaghetti"],
    ["Tennis", "Badminton", "Table tennis"],
    ["Cookies", "Cake", "Ice cream"],
    ["Alone", "With friends", "With family"],
    ["Drama", "Anime", "Movie"],
    ["Card games", "Board games", "Video games"],
    ["Running", "Cycling", "Swimming"],
    ["Piano", "Guitar", "Ukulele"],
    ["Horror", "Romance", "Action"],
    ["Tapioca", "Juice", "Smoothie"],
    ["Skateboarding", "Rollerblading", "Scooter"],
    ["Sightseeing", "Shopping", "Eating out"],
    ["Cafes", "Parks", "Libraries"],
    ["Short hair", "Long hair", "Medium hair"],
    ["Stuffed animals", "Figures", "Stickers"],
    ["Morning person", "Night person", "Afternoon person"],
    ["Comedy YouTube", "Gaming YouTube", "Music YouTube"],
    ["School trip", "Sports day", "Culture festival"],
  ]
};

let currentSet = 'a';
let queue = [];
let currentIdx = 0;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function init() {
  queue = shuffle(SETS[currentSet]);
  currentIdx = 0;
  document.getElementById('done-card').classList.remove('show');
  document.getElementById('main-card').style.display = 'flex';
  document.getElementById('btn-next').style.display = 'block';
  showCard();
}

function showCard() {
  const choices = queue[currentIdx];
  const card = document.getElementById('main-card');
  const set = currentSet;

  card.className = 'card c' + set;

  // Choices
  document.getElementById('card-choices').innerHTML = choices.map(c =>
    `<div class="choice">${c}</div>`
  ).join('');

  // Prompt color
  document.getElementById('card-prompt').className = 'prompt c' + set;

  // Counter
  const total = queue.length;
  document.getElementById('card-no').textContent = (currentIdx + 1) + ' / ' + total;
  document.getElementById('counter').textContent = (currentIdx + 1) + ' / ' + total;

  // Progress
  const pct = Math.round((currentIdx / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Animate
  card.classList.remove('animate');
  void card.offsetWidth;
  card.classList.add('animate');
}

function nextCard() {
  currentIdx++;
  if (currentIdx >= queue.length) {
    document.getElementById('main-card').style.display = 'none';
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('done-card').classList.add('show');
    document.getElementById('done-sub').textContent =
      (currentSet === 'a' ? 'Aセット' : 'Bセット') + ' 20問 コンプリート！';
    return;
  }
  showCard();
}

function resetCards() { init(); }

function switchSet(set) {
  currentSet = set;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + set).classList.add('active');

  const fill = document.getElementById('progress-fill');
  fill.className = 'progress-fill fill-' + set;

  const btn = document.getElementById('btn-next');
  btn.className = 'btn-next b' + set;

  init();
}

init();
</script>
</body>
</html>
